name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\CodexUsageTray.sln

      - name: Build
        run: dotnet build .\CodexUsageTray.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project .\tests\CodexUsageTray.Tests\CodexUsageTray.Tests.csproj --configuration Release --no-build

      - name: Audit dependencies
        run: dotnet list .\src\CodexUsageTray\CodexUsageTray.csproj package --vulnerable --include-transitive

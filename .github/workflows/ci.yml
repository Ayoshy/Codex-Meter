name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\CodexUsageTray.sln

      - name: Build
        run: dotnet build .\CodexUsageTray.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project .\tests\CodexUsageTray.Tests\CodexUsageTray.Tests.csproj --configuration Release --no-build

      - name: Audit dependencies
        run: dotnet list .\src\CodexUsageTray\CodexUsageTray.csproj package --vulnerable --include-transitive

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\CodexUsageTray.sln

      - name: Build
        run: dotnet build .\CodexUsageTray.sln --configuration Release --no-restore

      - name: Test
        run: dotnet run --project .\tests\CodexUsageTray.Tests\CodexUsageTray.Tests.csproj --configuration Release --no-build

      - name: Audit dependencies
        run: dotnet list .\src\CodexUsageTray\CodexUsageTray.csproj package --vulnerable --include-transitive
